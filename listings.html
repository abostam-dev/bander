<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>جميع العقارات | الوسيط</title>
  <style>
    body { margin: 0; font-family: Tahoma, sans-serif; background: #f9f9f9; }
    main { padding: 40px 20px; }
    h1 { text-align: center; color: #003366; }
    .grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px; margin-top: 30px;
    }
    .card {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: right;
    }
    .card img { width: 100%; height: 180px; object-fit: cover; }
    .card-body { padding: 15px; }
    .price { color: #e63946; font-weight: bold; }
  </style>
</head>
<body>
  <div id="header"></div>

  <main>
    <h1>🏘️ جميع العقارات</h1>
    <div class="grid">
      <div class="card"><img src="property1.jpg"><div class="card-body"><h3>فيلا بالرياض</h3><p>📍 حي الياسمين</p><p class="price">1,200,000 ريال</p></div></div>
      <div class="card"><img src="property2.jpg"><div class="card-body"><h3>شقة بجدة</h3><p>📍 حي النزهة</p><p class="price">750,000 ريال</p></div></div>
      <div class="card"><img src="property3.jpg"><div class="card-body"><h3>أرض بالدمام</h3><p>📍 حي الفيصلية</p><p class="price">950,000 ريال</p></div></div>
    </div>
  </main>

  <div id="footer"></div>

  <script>
    fetch("header.html").then(r => r.text()).then(d => document.getElementById("header").innerHTML = d);
    fetch("footer.html").then(r => r.text()).then(d => document.getElementById("footer").innerHTML = d);
  </script>
</body>
</html>
