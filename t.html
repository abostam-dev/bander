<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>اتصل بنا | الوسيط</title>
  <style>
    body { margin: 0; font-family: "Tahoma", sans-serif; background: #f9f9f9; }
    main { padding: 50px 20px; text-align: center; }
    h1 { color: #003366; margin-bottom: 20px; }
    form {
      max-width: 500px; margin: auto; background: #fff; padding: 25px;
      border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      text-align: right;
    }
    label { display: block; margin: 15px 0 5px; color: #333; }
    input, textarea {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ccc;
    }
    button {
      margin-top: 20px; background: #003366; color: #fff; border: none;
      padding: 12px 25px; border-radius: 30px; cursor: pointer;
    }
    button:hover { background: #002244; }
  </style>
</head>
<body>

  <div id="header"></div>

  <main>
    <h1>📞 تواصل معنا</h1>
    <form>
      <label>الاسم</label>
      <input type="text" required>
      <label>البريد الإلكتروني</label>
      <input type="email" required>
      <label>الرسالة</label>
      <textarea rows="5" required></textarea>
      <button type="submit">إرسال</button>
    </form>
  </main>

  <div id="footer"></div>

  <script>
    fetch("header.html").then(r => r.text()).then(d => document.getElementById("header").innerHTML = d);
    fetch("footer.html").then(r => r.text()).then(d => document.getElementById("footer").innerHTML = d);
  </script>
</body>
</html>
